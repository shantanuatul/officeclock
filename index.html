<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Office Clock</title>

<style>

@font-face {
    font-family: "Compacta";
    src: url("./CompactaBlack.otf") format("opentype");
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,
body{
    width:100%;
    height:100%;
}

body{
    background:#000;
    overflow:hidden;

    display:flex;
    justify-content:center;
    align-items:center;
}

.wrapper{
    width:90vw;
}

/* ---------- TOP ROW ---------- */

.top-row{

    display:grid;

    grid-template-columns:
        auto
        auto
        auto;

    justify-content:center;

    column-gap:4vw;

    align-items:end;
}

.time{
    font-family:"Compacta", sans-serif;
    font-size:15vw;
    line-height:0.82;
    letter-spacing:-0.04em;
    color:#F2F2F2;
}

.seconds-group{

    display:flex;
    align-items:flex-end;
}

.period{

    font-family:"Compacta", sans-serif;

    font-size:3vw;
    line-height:1;

    color:#242630;

    margin-left:.7vw;
    margin-bottom:.8vw;
}

/* ---------- BOTTOM ROW ---------- */

.bottom-row{

    display:grid;

    grid-template-columns:
        auto
        auto
        auto;

    justify-content:center;

    column-gap:4vw;

    margin-top:.8vw;

    align-items:start;
}

.date{

    font-family:Arial, sans-serif;
    font-size:2.1vw;
    color:white;

    justify-self:start;
}

.empty{
    width:100%;
}

.weather{

    font-family:Arial, sans-serif;
    font-size:2.1vw;
    color:white;

    display:flex;
    align-items:center;
    gap:10px;

    justify-self:end;
}

#weatherIcon{
    font-size:1.8vw;
}

</style>

</head>

<body>

<div class="wrapper">

```
<!-- CLOCK -->

<div class="top-row">

    <div class="time" id="hours">
        09
    </div>

    <div class="time" id="minutes">
        14
    </div>

    <div class="seconds-group">

        <div class="time" id="seconds">
            34
        </div>

        <div class="period" id="period">
            PM
        </div>

    </div>

</div>

<!-- DATE / WEATHER -->

<div class="bottom-row">

    <div class="date" id="date">
        Tue, 9 Jun
    </div>

    <div class="empty"></div>

    <div class="weather">

        <span id="weatherIcon">
            ☀
        </span>

        <span id="temp">
            39°C
        </span>

    </div>

</div>
```

</div>

<script>

function updateClock(){

    const now = new Date();

    let hours = now.getHours();

    const period =
        hours >= 12 ? "PM" : "AM";

    hours = hours % 12;

    if(hours === 0)
        hours = 12;

    document.getElementById("hours").textContent =
        String(hours).padStart(2,"0");

    document.getElementById("minutes").textContent =
        String(now.getMinutes()).padStart(2,"0");

    document.getElementById("seconds").textContent =
        String(now.getSeconds()).padStart(2,"0");

    document.getElementById("period").textContent =
        period;

    document.getElementById("date").textContent =
        now.toLocaleDateString(
            "en-GB",
            {
                weekday:"short",
                day:"numeric",
                month:"short"
            }
        );
}

async function updateWeather(){

    try{

        const response = await fetch(
            "https://api.open-meteo.com/v1/forecast?latitude=23.0225&longitude=72.5714&current=temperature_2m,weather_code"
        );

        const data = await response.json();

        document.getElementById("temp").textContent =
            Math.round(data.current.temperature_2m) + "°C";

        const code =
            data.current.weather_code;

        let icon = "☀";

        if(code >= 1 && code <= 3)
            icon = "⛅";

        else if(code >= 45 && code <= 48)
            icon = "🌫";

        else if(code >= 51 && code <= 67)
            icon = "🌧";

        else if(code >= 71 && code <= 77)
            icon = "❄";

        else if(code >= 95)
            icon = "⛈";

        document.getElementById("weatherIcon").textContent =
            icon;

    }
    catch(error){

        console.log(error);

    }
}

updateClock();
updateWeather();

setInterval(updateClock,1000);
setInterval(updateWeather,600000);

</script>

</body>
</html>
