<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">


<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}


body{
    background:#000;
    color:white;
    font-family:Inter, Helvetica, sans-serif;


    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;


    width:100vw;
    height:100vh;
}


.time{
    font-size:16vw;
    font-weight:200;
    letter-spacing:-0.05em;
}


.info{
    margin-top:20px;
    font-size:2vw;
    opacity:.8;
}

#weather{
    display:inline-flex;
    align-items:center;
    gap:12px;
    margin-left:20px;
}
</style>
</head>


<body>


<div class="time" id="clock"></div>
<div class="info">
    <span id="date"></span>

    <span id="weather">
        <span id="weatherIcon">☀</span>
        <span id="temp">--°C</span>
    </span>
</div>


<script>

function updateClock(){

    const now = new Date();

    const time = now.toLocaleTimeString(
        [],
        {
            hour:'2-digit',
            minute:'2-digit',
            second:'2-digit',
            hour12:false
        }
    );

    const date = now.toLocaleDateString(
        'en-GB',
        {
            weekday:'short',
            day:'numeric',
            month:'short'
        }
    );

    document.getElementById('clock').innerText = time;
    document.getElementById('date').innerText = date;
}


async function updateWeather(){

    try{

        const response = await fetch(
            'https://api.open-meteo.com/v1/forecast?latitude=23.0225&longitude=72.5714&current=temperature_2m,weather_code'
        );

        const data = await response.json();

        document.getElementById('temp').innerText =
            Math.round(data.current.temperature_2m) + '°C';

        const code = data.current.weather_code;

        let icon = '☀';

        if(code >= 1 && code <= 3)
            icon = '⛅';

        if(code >= 45)
            icon = '🌫';

        if(code >= 51)
            icon = '🌧';

        if(code >= 95)
            icon = '⛈';

        document.getElementById('weatherIcon').innerText = icon;

    }catch(error){

        console.log(error);

    }
}


updateClock();
updateWeather();

setInterval(updateClock,1000);
setInterval(updateWeather,600000);

</script>


</body>
</html>
