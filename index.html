<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Office Clock</title>

<style>

@font-face {
    font-family: "Compacta";
    src: url("./CompactaBlack.otf") format("opentype");
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,
body{
    width:100%;
    height:100%;
}

body{
    background:#000;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
}

.clock-block{
    display:inline-flex;
    flex-direction:column;
    align-items:center;
}

/* ---------- TOP ROW ---------- */

.top-row{
    display:flex;
    align-items:baseline;
    column-gap:0;   /* remove — spacing now comes from width on .time */
}

.time{
    font-family:"Compacta", sans-serif;
    font-size:11.25vw;
    line-height:0.82;
    letter-spacing:0.01em;
    color:#F2F2F2;

    width:22vw;          /* increase this to add more space between digits */
    text-align:center;
    display:block;
}

/* ---------- BOTTOM ROW ---------- */

.bottom-row{
    display:flex;
    align-items:center;
    gap:2vw;
    margin-top:0.7vw;   /* spacing between clock block and date/weather */
}

.date,
.weather{
    font-family:Arial, sans-serif;
    font-size:1.575vw;
    color:white;
}

.weather{
    display:flex;
    align-items:center;
    gap:0.5vw;
}

#weatherIcon{
    font-size:1.35vw;
}

</style>
</head>

<body>

<div class="clock-block">

    <div class="top-row">
        <div class="time" id="hours">00</div>
        <div class="time" id="minutes">00</div>
        <div class="time" id="seconds">00</div>
    </div>

    <div class="bottom-row">
        <div class="date" id="date">Tue, 9 Jun</div>
        <div class="weather">
            <span id="weatherIcon">☀</span>
            <span id="temp">39°C</span>
        </div>
    </div>

</div>

<script>

function updateClock(){

    const now = new Date();

    document.getElementById("hours").textContent =
        String(now.getHours()).padStart(2,"0");

    document.getElementById("minutes").textContent =
        String(now.getMinutes()).padStart(2,"0");

    document.getElementById("seconds").textContent =
        String(now.getSeconds()).padStart(2,"0");

    document.getElementById("date").textContent =
        now.toLocaleDateString(
            "en-GB",
            {
                weekday:"short",
                day:"numeric",
                month:"short"
            }
        );
}

async function updateWeather(){

    try{

        const response = await fetch(
            "https://api.open-meteo.com/v1/forecast?latitude=23.0225&longitude=72.5714&current=temperature_2m,weather_code"
        );

        const data = await response.json();

        document.getElementById("temp").textContent =
            Math.round(data.current.temperature_2m) + "°C";

        const code = data.current.weather_code;

        let icon = "☀";

        if(code >= 1 && code <= 3)        icon = "⛅";
        else if(code >= 45 && code <= 48) icon = "🌫";
        else if(code >= 51 && code <= 67) icon = "🌧";
        else if(code >= 71 && code <= 77) icon = "❄";
        else if(code >= 95)               icon = "⛈";

        document.getElementById("weatherIcon").textContent = icon;

    }
    catch(error){
        console.log(error);
    }
}

updateClock();
updateWeather();

setInterval(updateClock, 1000);
setInterval(updateWeather, 600000);

</script>

</body>
</html>
