<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Office Clock</title>

<style>

@font-face {
    font-family: "Compacta";
    src: url("./CompactaBlack.otf") format("opentype");
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,
body{
    width:100%;
    height:100%;
}

body{
    background:#000;
    overflow:hidden;

    display:flex;
    justify-content:center;
    align-items:center;
}

.wrapper{
    width:90vw;
}

.clock-layout{
    display:flex;
    justify-content:center;
    align-items:flex-end;
    gap:4vw;
}

.column{
    display:flex;
    flex-direction:column;
}

.time{
    font-family:"Compacta", sans-serif;
    font-size:15vw;
    line-height:0.82;
    letter-spacing:-0.04em;
    color:#f2f2f2;
}

.meta{
    margin-top:0.6vw;

    font-family:Arial, sans-serif;
    font-size:2.1vw;
    font-weight:300;
    color:white;
}

.seconds-column{
    display:flex;
    flex-direction:column;
}

.seconds-row{
    display:flex;
    align-items:flex-end;
}

.period{
    font-family:"Compacta", sans-serif;
    font-size:3vw;
    line-height:1;
    color:#242630;

    margin-left:0.8vw;
    margin-bottom:1vw;
}

.weather{
    margin-top:0.6vw;

    display:flex;
    align-items:center;
    gap:10px;

    font-family:Arial, sans-serif;
    font-size:2.1vw;
    font-weight:300;
    color:white;
}

#weatherIcon{
    font-size:1.8vw;
}

</style>

</head>

<body>

<div class="wrapper">

```
<div class="clock-layout">

    <div class="column">

        <div class="time" id="hours">
            09
        </div>

        <div class="meta" id="date">
            Tue, 9 Jun
        </div>

    </div>

    <div class="column">

        <div class="time" id="minutes">
            14
        </div>

    </div>

    <div class="seconds-column">

        <div class="seconds-row">

            <div class="time" id="seconds">
                34
            </div>

            <div class="period" id="period">
                PM
            </div>

        </div>

        <div class="weather">

            <span id="weatherIcon">
                ☀
            </span>

            <span id="temp">
                39°C
            </span>

        </div>

    </div>

</div>
```

</div>

<script>

function updateClock(){

    const now = new Date();

    let hours = now.getHours();

    const period =
        hours >= 12 ? "PM" : "AM";

    hours = hours % 12;

    if(hours === 0)
        hours = 12;

    document.getElementById("hours").textContent =
        String(hours).padStart(2,"0");

    document.getElementById("minutes").textContent =
        String(now.getMinutes()).padStart(2,"0");

    document.getElementById("seconds").textContent =
        String(now.getSeconds()).padStart(2,"0");

    document.getElementById("period").textContent =
        period;

    document.getElementById("date").textContent =
        now.toLocaleDateString(
            "en-GB",
            {
                weekday:"short",
                day:"numeric",
                month:"short"
            }
        );
}

async function updateWeather(){

    try{

        const response = await fetch(
            "https://api.open-meteo.com/v1/forecast?latitude=23.0225&longitude=72.5714&current=temperature_2m,weather_code"
        );

        const data = await response.json();

        document.getElementById("temp").textContent =
            Math.round(data.current.temperature_2m) + "°C";

        const code =
            data.current.weather_code;

        let icon = "☀";

        if(code >= 1 && code <= 3)
            icon = "⛅";

        else if(code >= 45 && code <= 48)
            icon = "🌫";

        else if(code >= 51 && code <= 67)
            icon = "🌧";

        else if(code >= 71 && code <= 77)
            icon = "❄";

        else if(code >= 95)
            icon = "⛈";

        document.getElementById("weatherIcon").textContent =
            icon;

    }
    catch(error){

        console.log(error);

    }

}

updateClock();
updateWeather();

setInterval(updateClock,1000);
setInterval(updateWeather,600000);

</script>

</body>
</html>
