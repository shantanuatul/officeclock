<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Office Clock</title>

<style>

@font-face {
    font-family: "Compacta";
    src: url("./CompactaBlack.otf") format("opentype");
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,
body{
    width:100%;
    height:100%;
}

body{
    background:#000;
    overflow:hidden;
}

.container{
    position:absolute;
    left:50%;
    top:50%;

    transform:translate(-50%,-55%);
    width:90vw;
}

.time-row{
    display:flex;
    justify-content:center;
    align-items:flex-end;
}

.time-block{
    font-family:"Compacta", sans-serif;
    font-size:15vw;
    line-height:0.82;
    color:#F2F2F2;
    letter-spacing:-0.04em;
}

#minutes{
    margin-left:4vw;
}

#seconds{
    margin-left:4vw;
}

.period{
    font-family:"Compacta", sans-serif;
    font-size:4vw;
    color:#26282F;

    margin-left:1vw;
    margin-bottom:1.8vw;
}

.info-row{
    display:flex;
    justify-content:space-between;

    margin-top:1.2vw;

    font-family:Arial, sans-serif;
    font-size:2vw;
    color:white;
}

.weather{
    display:flex;
    align-items:center;
    gap:10px;
}

#weatherIcon{
    font-size:1.8vw;
}

</style>

</head>

<body>

<div class="container">

    <div class="time-row">

        <div class="time-block" id="hours">
            05
        </div>

        <div class="time-block" id="minutes">
            13
        </div>

        <div class="time-block" id="seconds">
            37
        </div>

        <div class="period" id="period">
            PM
        </div>

    </div>

    <div class="info-row">

        <div id="date">
            Tue, 9 Jun
        </div>

        <div class="weather">

            <span id="weatherIcon">
                ☀
            </span>

            <span id="temp">
                39°C
            </span>

        </div>

    </div>

</div>

<script>

function updateClock(){

    const now = new Date();

    let hours = now.getHours();

    const period =
        hours >= 12 ? "PM" : "AM";

    hours = hours % 12;

    if(hours === 0)
        hours = 12;

    document.getElementById("hours").textContent =
        String(hours).padStart(2,"0");

    document.getElementById("minutes").textContent =
        String(now.getMinutes()).padStart(2,"0");

    document.getElementById("seconds").textContent =
        String(now.getSeconds()).padStart(2,"0");

    document.getElementById("period").textContent =
        period;

    document.getElementById("date").textContent =
        now.toLocaleDateString(
            "en-GB",
            {
                weekday:"short",
                day:"numeric",
                month:"short"
            }
        );
}

async function updateWeather(){

    try{

        const response = await fetch(
            "https://api.open-meteo.com/v1/forecast?latitude=23.0225&longitude=72.5714&current=temperature_2m,weather_code"
        );

        const data = await response.json();

        document.getElementById("temp").textContent =
            Math.round(data.current.temperature_2m) + "°C";

        const code =
            data.current.weather_code;

        let icon = "☀";

        if(code >= 1 && code <= 3)
            icon = "⛅";

        else if(code >= 45)
            icon = "🌫";

        else if(code >= 51)
            icon = "🌧";

        else if(code >= 71)
            icon = "❄";

        else if(code >= 95)
            icon = "⛈";

        document.getElementById("weatherIcon").textContent =
            icon;

    }catch(error){

        console.log(error);

    }
}

updateClock();
updateWeather();

setInterval(updateClock,1000);
setInterval(updateWeather,600000);

</script>

</body>

</html>
