<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Office Clock</title>

<style>

@font-face {
    font-family: "Compacta";
    src: url("./CompactaBlack.otf") format("opentype");
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,
body{
    width:100%;
    height:100%;
}

body{
    background:#000;
    color:#F2F2F2;

    display:flex;
    justify-content:center;
    align-items:center;

    overflow:hidden;
}

.container{
    width:80vw;
}

.time-row{
    display:flex;
    justify-content:space-between;
    align-items:flex-end;
}

.time-block{
    font-family:"Compacta", sans-serif;
    font-size:14vw;
    line-height:0.85;
    letter-spacing:-0.03em;
    color:#F2F2F2;
}

.period{
    font-family:"Compacta", sans-serif;
    font-size:4vw;
    color:#353535;
    margin-bottom:2vw;
    margin-left:-1vw;
}

.info-row{
    display:grid;
    grid-template-columns: 1fr 1fr 1fr;

    margin-top:1.2vw;
    align-items:center;
}

.weather{
    justify-self:start;
    display:flex;
    align-items:center;
    gap:10px;
}

#weatherIcon{
    font-size:1.9vw;
}

</style>

</head>

<body>

<div class="container">

    <div class="time-row">

        <div class="time-block" id="hours">09</div>

        <div class="time-block" id="minutes">14</div>

        <div class="time-block" id="seconds">34</div>

        <div class="period" id="period">PM</div>

    </div>

    <div class="info-row">

    <div id="date">
        Tue 9 Jun
    </div>

    <div></div>

    <div class="weather">
        <span id="weatherIcon">☀</span>
        <span id="temp">41°C</span>
    </div>

</div>

<script>

function updateClock(){

    const now = new Date();

    let hours = now.getHours();

    const period = hours >= 12 ? "PM" : "AM";

    hours = hours % 12;
    if(hours === 0) hours = 12;

    const minutes = now.getMinutes();
    const seconds = now.getSeconds();

    document.getElementById("hours").textContent =
        String(hours).padStart(2,"0");

    document.getElementById("minutes").textContent =
        String(minutes).padStart(2,"0");

    document.getElementById("seconds").textContent =
        String(seconds).padStart(2,"0");

    document.getElementById("period").textContent =
        period;

    document.getElementById("date").textContent =
        now.toLocaleDateString(
            "en-GB",
            {
                weekday:"short",
                day:"numeric",
                month:"short"
            }
        );
}

async function updateWeather(){

    try{

        const response = await fetch(
            "https://api.open-meteo.com/v1/forecast?latitude=23.0225&longitude=72.5714&current=temperature_2m,weather_code"
        );

        const data = await response.json();

        document.getElementById("temp").textContent =
            Math.round(data.current.temperature_2m) + "°C";

        const code = data.current.weather_code;

        let icon = "☀";

        if(code >= 1 && code <= 3)
            icon = "⛅";

        else if(code >= 45 && code <= 48)
            icon = "🌫";

        else if(code >= 51 && code <= 67)
            icon = "🌧";

        else if(code >= 71 && code <= 77)
            icon = "❄";

        else if(code >= 95)
            icon = "⛈";

        document.getElementById("weatherIcon").textContent =
            icon;

    }
    catch(error){

        console.log("Weather error:", error);

    }
}

updateClock();
updateWeather();

setInterval(updateClock,1000);
setInterval(updateWeather,600000);

</script>

</body>

</html>
